spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: false

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  security:
    user:
      name: test-admin
      password: test-password

# API security
api:
  security:
    api-key: test-api-key


# Exchange rate API (dummy/stub endpoint)
exchange-rate:
  api-url: https://api.fiscaldata.treasury.gov/services/api/fiscal_service/v1/accounting/od/rates_of_exchange

# Resilience4j — relaxed settings for tests
resilience4j:
  retry:
    instances:
      exchangeRate:
        max-attempts: 1
        retry-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException
          - com.hash.billpay.exception.ExchangeRateApiException
        ignore-exceptions:
          - com.hash.billpay.exception.ExchangeRateNotFoundException
  circuitbreaker:
    instances:
      exchangeRate:
        register-health-indicator: true
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        minimum-number-of-calls: 5
        record-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException
          - com.hash.billpay.exception.ExchangeRateApiException
        ignore-exceptions:
          - com.hash.billpay.exception.ExchangeRateNotFoundException
