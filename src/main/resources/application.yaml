spring:
  application:
    name: bill-payment-service
  #data source name, user & password
  datasource:
    url: jdbc:h2:file:./data/billpaymentdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: admin
    password: 1234

  h2:
    console:
      enabled: true
      path: /h2-console
  # DDL auto update, show sql true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Security credentials for Actuator endpoints
  security:
    user:
      name: ${ACTUATOR_USERNAME:actuator-admin}
      password: ${ACTUATOR_PASSWORD:actuator-password}

# API security
api:
  security:
    api-key: ${API_KEY:test-api-key}

server:
  port: 8080

# Exchange rate API (dummy/stub endpoint)
exchange-rate:
  api-url: https://api.fiscaldata.treasury.gov/services/api/fiscal_service/v1/accounting/od/rates_of_exchange

# Resilience4j
resilience4j:
  retry:
    instances:
      exchangeRate:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException
          - com.hash.billpay.exception.ExchangeRateApiException
        ignore-exceptions:
          - com.hash.billpay.exception.ExchangeRateNotFoundException
  circuitbreaker:
    instances:
      exchangeRate:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        record-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException
          - com.hash.billpay.exception.ExchangeRateApiException
        ignore-exceptions:
          - com.hash.billpay.exception.ExchangeRateNotFoundException

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers
  endpoint:
    health:
      show-details: when-authorized
  health:
    circuitbreakers:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html