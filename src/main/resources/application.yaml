spring:
  application:
    name: bill-payment-service
  #data source name, user & password
  datasource:
    url: jdbc:h2:file:./data/billpaymentdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: admin
    password: 1234

  h2:
    console:
      enabled: true
      path: /h2-console
  # DDL auto update, show sql true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Security credentials for Actuator endpoints
  security:
    user:
      name: ${ACTUATOR_USERNAME:actuator-admin}
      password: ${ACTUATOR_PASSWORD:changeme}

server:
  port: 8080

# Exchange rate API (dummy/stub endpoint)
exchange-rate:
  api-url: https://api.fiscaldata.treasury.gov/services/api/fiscal_service/v1/accounting/od/rates_of_exchange


# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html