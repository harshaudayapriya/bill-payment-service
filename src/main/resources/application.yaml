spring:
  application:
    name: bill-payment-service
  #data source name, user & password
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/billpaydb}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:billpay}
    password: ${SPRING_DATASOURCE_PASSWORD:billpay_secret}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: 30000      # 30 seconds to acquire a connection
      idle-timeout: 600000           # 10 minutes before idle connections are removed
      max-lifetime: 1800000          # 30 minutes max lifetime per connection
      leak-detection-threshold: 60000 # warn if connection not returned within 60s
      pool-name: BillPayHikariPool

    jpa:
      database-platform: org.hibernate.dialect.PostgreSQLDialect
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true

  # Security credentials for Actuator endpoints
  security:
    user:
      name: ${ACTUATOR_USERNAME:actuator-admin}
      password: ${ACTUATOR_PASSWORD:actuator-password}

# API security
api:
  security:
    api-key: ${API_KEY:test-api-key}

server:
  port: 8080

# Exchange rate API (dummy/stub endpoint)
exchange-rate:
  api-url: https://api.fiscaldata.treasury.gov/services/api/fiscal_service/v1/accounting/od/rates_of_exchange

# Resilience4j
resilience4j:
  retry:
    instances:
      exchangeRate:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException
          - com.hash.billpay.exception.ExchangeRateApiException
        ignore-exceptions:
          - com.hash.billpay.exception.ExchangeRateNotFoundException
  circuitbreaker:
    instances:
      exchangeRate:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        record-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException
          - com.hash.billpay.exception.ExchangeRateApiException
        ignore-exceptions:
          - com.hash.billpay.exception.ExchangeRateNotFoundException

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers
  endpoint:
    health:
      show-details: when-authorized
  health:
    circuitbreakers:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html